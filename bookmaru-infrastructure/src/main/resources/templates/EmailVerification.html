<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>책마루 인증코드</title>
    <style>
        /* 기본 리셋 */
        body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
        img { -ms-interpolation-mode: bicubic; }

        /* 모바일 반응형 스타일 (화면 폭 600px 이하일 때 적용) */
        @media screen and (max-width: 600px) {
            .mobile-padding {
                padding: 20px !important; /* 모바일에서는 여백을 줄임 */
            }
            .mobile-font {
                font-size: 14px !important; /* 모바일 폰트 크기 조정 */
            }
        }
    </style>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f4f4; width: 100% !important;">

    <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #f4f4f4;">
        <tr>
            <td align="center" style="padding: 20px 0;">

                <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 600px; margin: 0 auto; background-color: #ffffff; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
                    <tr>
                        <td class="mobile-padding" style="padding: 40px; text-align: center;">

                            <h1 style="color: #333333; margin: 0 0 20px 0; font-family: 'Arial', sans-serif; font-size: 24px;">
                                인증 번호 안내
                            </h1>

                            <p class="mobile-font" style="color: #666666; font-family: 'Arial', sans-serif; font-size: 16px; line-height: 1.6; margin: 0 0 30px 0;">
                                안녕하세요!<br>
                                요청하신 인증 번호를 보내드립니다.<br>
                                아래 번호를 입력창에 입력해주세요.
                            </p>

                            <div style="background-color: #f0f8ff; border: 2px dashed #007bff; border-radius: 8px; padding: 20px; margin: 0 0 30px 0;">
                                    <span style="font-family: 'Arial', sans-serif; font-size: 28px; font-weight: bold; letter-spacing: 5px; color: #007bff; display: block;" th:text="${code}">
                                        123456
                                    </span>
                            </div>

                            <p style="color: #999999; font-family: 'Arial', sans-serif; font-size: 12px; line-height: 1.5; margin: 0;">
                                이 인증 번호는 5분 뒤에 만료됩니다.<br>
                                본인이 요청한 것이 아니라면 이 메일을 무시하세요.
                            </p>

                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>

</body>
</html>
