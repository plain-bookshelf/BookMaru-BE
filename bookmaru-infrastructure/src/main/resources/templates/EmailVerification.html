<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>이메일 인증</title>
    <style type="text/css">
        body { margin: 0; padding: 0; background-color: #f4f4f4; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        /* 반응형 처리 */
        @media screen and (max-width: 600px) {
            .container { width: 100% !important; }
        }
    </style>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f4f4;">

<table border="0" cellpadding="0" cellspacing="0" width="100%" style="height: 100%;">
    <tr>
        <td align="center" style="padding: 10px 0;">

            <table border="0" cellpadding="0" cellspacing="0" width="600" class="container" style="background-color: #ffffff; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">

                <tr>
                    <td align="center" style="background: linear-gradient(135deg, #42E695 0%, #3BB2B8 100%); padding: 30px 0;">
                        <img src="https://imgur.com/vPIw1pG.png" alt="App Logo" width="100" style="display: block; border: 0;">
                    </td>
                </tr>

                <tr>
                    <td style="padding: 30px 40px; text-align: center;">
                        <h1 style="color: #333333; font-size: 24px; font-weight: bold; margin-bottom: 15px;">이메일 인증 코드</h1>

                        <p style="color: #666666; font-size: 16px; line-height: 1.6; margin-bottom: 25px;">
                            안녕하세요,
                            <span style="white-space: nowrap;">
                                <span th:text="${email}" style="color: #333333; font-weight: bold;">회원</span>님,
                            </span><br>
                            아래 인증 코드를 입력해주세요.
                        </p>

                        <div style="background-color: #f8f9fa; border: 2px dashed #3BB2B8; border-radius: 12px; padding: 15px 20px; margin: 0 auto 25px auto; display: inline-block;">
                            <span th:text="${code}" style="color: #3BB2B8; font-size: 32px; font-weight: bold; letter-spacing: 6px; font-family: monospace;">123456</span>
                        </div>

                        <p style="color: #999999; font-size: 14px; margin: 0;">
                            이 코드는 5분간 유효합니다.
                        </p>
                    </td>
                </tr>

                <tr>
                    <td style="background-color: #fcfcfc; padding: 15px; text-align: center; border-top: 1px solid #eeeeee;">
                        <p style="color: #cccccc; font-size: 12px; margin: 0;">
                            &copy; 2024 Bookmaru. All rights reserved.
                        </p>
                    </td>
                </tr>
            </table>

        </td>
    </tr>
</table>

</body>
</html>
