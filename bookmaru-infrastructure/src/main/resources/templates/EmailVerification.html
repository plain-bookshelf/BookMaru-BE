<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>인증코드</title>
</head>
<body style="margin: 0; padding: 0; font-family: 'Arial', sans-serif; background-color: #f4f4f4;">

    <div style="max-width: 600px; margin: 0 auto; background-color: #ffffff; padding: 40px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">

        <h1 style="color: #333333; text-align: center;">인증 번호 안내</h1>

        <p style="color: #666666; font-size: 16px; line-height: 1.5; text-align: center;">
            안녕하세요!<br>
            요청하신 인증 번호를 보내드립니다.<br>
            아래 번호를 입력창에 입력해주세요.
        </p>

        <div style="background-color: #f0f8ff; border: 2px dashed #007bff; padding: 20px; text-align: center; margin: 30px 0; font-size: 24px; font-weight: bold; letter-spacing: 5px; color: #007bff;">
            <span th:text="${code}">123456</span>
        </div>

        <p style="color: #999999; font-size: 12px; text-align: center;">
            이 인증 번호는 5분 뒤에 만료됩니다.<br>
            본인이 요청한 것이 아니라면 이 메일을 무시하세요.
        </p>
    </div>

</body>
</html>
