server:
  port: 8080
  shutdown: graceful

spring:
  main:
    allow-bean-definition-overriding: true

  lifecycle:
    timeout-per-shutdown-phase: 60s

  data:
    redis:
      host: ${REDIS_HOST}
      port: 6381
      password: ${REDIS_PASSWORD}

      db-index:
        auth: 0
        cache: 1

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  mail:
    host: ${EMAIL_HOST}
    port: 587
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  threads:
    virtual:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: ${DDL:validate}
    properties:
      hibernate:
        default_schema: public
        show_sql: true
        default_batch_fetch_size: 100
    open-in-view: false

  jackson:
    property-naming-strategy: SNAKE_CASE

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${OAUTH_GOOGLE_CLIENT_ID}
            client-secret: ${OAUTH_GOOGLE_CLIENT_PASSWORD}
            scope:
              - profile
              - email

          naver:
            client-id: ${OAUTH_NAVER_CLIENT_ID}
            client-secret: ${OAUTH_NAVER_CLIENT_PASSWORD}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope:
              - name
              - email
              - profile_image
            redirect-uri: ${OAUTH_BASEURL}/${OAUTH_ACTION}/oauth2/code/${OAUTH_NAVER_REGISTRATION_ID}
            client-name: Naver

          kakao:
            client-id: ${OAUTH_KAKAO_CLIENT_ID}
            client-secret: ${OAUTH_KAKAO_CLIENT_PASSWORD}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope:
              - profile_nickname
              - profile_image
              - account_email
            redirect-uri: ${OAUTH_BASEURL}/${OAUTH_ACTION}/oauth2/code/${OAUTH_KAKAO_REGISTRATION_ID}
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

jwt:
  header: ${JWT_HEADER}
  prefix: ${JWT_PREFIX}
  accessExp: ${JWT_ACCESS_TOKEN_TIME}
  refreshExp: ${JWT_REFRESH_TOKEN_TIME}
  secret: ${JWT_SECRET_KEY}